id: 9cfb6d0c-7099-400c-99da-f70077ad96d4
name: "vSphere Cluster CPU Ready"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  Average of VM CPU Ready in the cluster. A simple average is used instead of
  normalized average that consider the size of the VM (number of vCPU).

  It is using 20 second average instead of 5 minute average, to give leading
  indicator.

  For details, see VCF Operations Transformation book and vSphere Metrics book,
  which are parts of Operationalize Your World.
unit_id: percent
formula: |
  avg(${adaptertype=VMWARE, objecttype=VirtualMachine, attribute=cpu|20_sec_peak_readyPct, depth=3})
