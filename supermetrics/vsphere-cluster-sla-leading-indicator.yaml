id: ea021c6e-6d2b-4665-abf3-1d81a3232e40
name: "vSphere Cluster SLA Leading Indicator"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  It's a leading indicator to the SLA, which is a 1-month lagging counter.
  Note that you can't derive cluster SLA from Cluster SLI. You derive it
  from VM SLA.

  For details, see VCF Operations Transformation book and vSphere Metrics
  book, which are parts of Operationalize Your World.
unit_id: percent
formula: |
  ( ${this, metric=summary|number_running_vms} - count(${adaptertype=VMWARE, objecttype=VirtualMachine, attribute=performance|number_of_kpis_breached, depth=2, where=($value>0)
  })) / ${this, metric=summary|number_running_vms} * 100
