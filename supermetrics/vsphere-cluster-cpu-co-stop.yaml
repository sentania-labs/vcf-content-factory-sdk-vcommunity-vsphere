id: 7574a50d-f9bd-4143-a8d7-d1e496dc8659
name: "vSphere Cluster CPU Co-Stop"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  Average of VM CPU Co-Stop in the cluster. A simple average is used instead of
  normalized average that considers the size of the VM (number of vCPU).

  It is using 20 second average instead of 5 minute average, to give a leading
  indicator.

  For details, see VCF Operations Transformation book and vSphere Metrics book,
  which are parts of Operationalize Your World.
unit_id: percent
formula: |
  avg(${adaptertype=VMWARE, objecttype=VirtualMachine, attribute=cpu|20_sec_peak_costopPct, depth=3})
