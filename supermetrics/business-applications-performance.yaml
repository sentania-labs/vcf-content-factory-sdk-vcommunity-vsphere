id: 84915f16-b31d-4bd7-bf8e-50306db9323a
name: "Business Applications Performance"
resource_kinds:
  - resource_kind_key: Enterprise
    adapter_kind_key: Container
description: >
  Average of all Business Application performance, so you can track many using a single trend chart. This number should be stable, or its pattern follows your expectation, in a large environment (hundreds of VMs).
unit_id: percent
formula: |
  avg(${adaptertype=Container, objecttype=BusinessService, attribute=@supermetric:"Business Application Performance", depth=1})
