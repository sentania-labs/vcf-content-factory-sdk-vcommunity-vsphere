id: a693e187-797b-4cb5-9fe0-3dd273088e88
name: "Clusters Availability"
resource_kinds:
  - resource_kind_key: vSphere World
    adapter_kind_key: VMWARE
description: >
  Average availability of all clusters. It's a simple average, not a normalized
  average that considers the size of each cluster, as each cluster has its own
  purpose (and hence size).
unit_id: percent
formula: |
  avg(${adaptertype=VMWARE, objecttype=ClusterComputeResource, attribute=summary|cluster_availability, depth=4})
