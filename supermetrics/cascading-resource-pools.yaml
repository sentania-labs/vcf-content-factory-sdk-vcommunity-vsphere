id: 2c3a09ab-96c7-46f1-9ebe-a9b275cf1ead
name: "Cascading Resource Pools"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  The number of Level 2 or deeper resource pools. Cascading RP increases
  complexity of both capacity monitoring and performance troubleshooting.
unit_id: ""
formula: |
  count(${adaptertype=VMWARE, objecttype=ResourcePool, attribute=badge|health, depth=5}) - count(${adaptertype=VMWARE, objecttype=ResourcePool, attribute=badge|health, depth=1})
