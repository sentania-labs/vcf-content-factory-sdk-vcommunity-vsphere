id: 1cd5caa5-e8d8-48f8-b02b-c233fd8d235e
name: "vSphere VM Memory Zip Swap"
resource_kinds:
  - resource_kind_key: VirtualMachine
    adapter_kind_key: VMWARE
description: >
  Percentage of memory that is zipped and swapped. Measured against Guest OS Used memory, not total
  capacity, for greater accuracy.

  For details, see VCF Operations Transformation book and vSphere Metrics book, which are parts of
  Operationalize Your World.
unit_id: percent
formula: |
  (${this, metric=mem|compressed_average}+ ${this, metric=mem|swapped_average}) / ${this, metric=guest|used_memory} * 100
