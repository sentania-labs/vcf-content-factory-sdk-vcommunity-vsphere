id: 400106ec-879f-46d7-a03b-d3781072cfa2
name: "Unavailable ESXi Host"
resource_kinds:
  - resource_kind_key: vSphere World
    adapter_kind_key: VMWARE
description: >
  Count of vSphere ESXi hosts that are not available. The number should match
  your expectation, based on what's happening in actual operations. Traverses
  from vSphere World down four levels to HostSystem objects and counts those
  where sys|poweredOn is less than 1 (i.e. unavailable / not powered on).
unit_id: ""
formula: |
  count(${adaptertype=VMWARE, objecttype=HostSystem, metric=sys|poweredOn, depth=4, where=($value < 1)})
