id: 514831e0-a441-4084-906a-1d69d7c05506
name: "vSphere Cluster Worst VM Memory Contention"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  The highest CPU Memory Contention (latency) of all VMs in the cluster. This is using 20 second
  average instead of 5 minute average to give a leading indicator.

  For details, see VCF Operations Transformation book and vSphere Metrics book,
  which are parts of Operationalize Your World.
unit_id: percent
formula: |
  max(${adaptertype=VMWARE, objecttype=VirtualMachine, attribute=mem|20_sec_peak_host_contentionPct, depth=3})
