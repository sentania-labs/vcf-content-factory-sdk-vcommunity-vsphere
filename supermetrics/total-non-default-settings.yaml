id: f30f298c-385f-4ef8-b511-4092a348a346
name: "Total Non-default Settings"
resource_kinds:
  - resource_kind_key: VmwareDistributedVirtualSwitch
    adapter_kind_key: VMWARE
description: >
  Sum of all security changes that deviates from default value. This should be minimal and matches your design.
unit_id: ""
formula: |
  count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|block_override_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|ipfix_override_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|live_port_moving_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|network_resourcepool_moving_override_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|port_config_reset_at_disconnect, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|security_policy_override_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|shaping_override_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|traffic_filter_override_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|uplink_teaming_override_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|vendor_config_override_allowed, depth=1,  where=($value equals 'false')}) + count(${adaptertype=VMWARE, objecttype=DistributedVirtualPortgroup, attribute=config|policies|override|vlan_override_allowed, depth=1,  where=($value equals 'false')})
