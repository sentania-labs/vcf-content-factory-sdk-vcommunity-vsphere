id: 4f1c7523-163f-4b81-bd54-fd6924cc16d9
name: "vSphere Cluster Worst VM CPU Co-Stop"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  The highest CPU Co-Stop of all VMs in the cluster. This is using 20 second
  average instead of 5 minute average to give a leading indicator.

  For details, see VCF Operations Transformation book and vSphere Metrics book,
  which are parts of Operationalize Your World.
unit_id: percent
formula: |
  max(${adaptertype=VMWARE, objecttype=VirtualMachine, attribute=cpu|20_sec_peak_costopPct, depth=3})
