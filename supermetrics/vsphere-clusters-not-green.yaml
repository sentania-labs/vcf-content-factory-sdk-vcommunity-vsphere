id: dda97f70-65e0-4c5a-b6f0-7acec936a0bd
name: "vSphere Clusters not Green"
resource_kinds:
  - resource_kind_key: vSphere World
    adapter_kind_key: VMWARE
description: >
  Count of vSphere Clusters whose Performance (%) values are no longer in the green zone (75 - 100). The values should match your operational expectation.

  For details, see VCF Operations Transformation book and vSphere Metrics book, which are parts of Operationalize Your World.

unit_id: ""
formula: |
  count(${adaptertype=VMWARE, objecttype=ClusterComputeResource, attribute=@supermetric:"vSphere Cluster Performance", depth=4,
  where="<75" })
