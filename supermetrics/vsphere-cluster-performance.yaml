id: a1b7d29a-c6b8-4137-a4dc-d983e882eb60
name: "vSphere Cluster Performance"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  Key Performance Indicator (%) of a vSphere Cluster. This is the primary metric to determine
  cluster performance over time. Used this for monitoring at scale.

  It is using 20 second average instead of 5 minute average, to give leading indicator.

  CPU Other Wait and CPU Overlap are excluded as they over inflate the overall value as they tend
  to be very good.

  For details, see VCF Operations Transformation book and vSphere Metrics book, which are parts of
  Operationalize Your World.
unit_id: percent
formula: |
  sum ([(${this, metric=@supermetric:"vSphere Cluster CPU Ready"} as Ready     < 1  ? (100 - ( (Ready     - 0)/1  * 25 ) ) * 1 : Ready     < 2   ? (75 - ((Ready     - 1 )/1  * 25))*2 : Ready     < 4   ? (50-((Ready     - 2  ) /2   * 25))*4 : (25 - (min([Ready     -4,4    ])/4  *25))*8), (${this, metric=@supermetric:"vSphere Cluster CPU Co-Stop"} as coStop    < 1 ? (100 - ( (coStop    - 0)/1 * 25 ) ) * 1 : coStop    < 2 ? (75 - ((coStop    - 1)/1 * 25))*2 : coStop    < 4   ? (50-((coStop    - 2) /2 * 25))*4 : (25 - (min([coStop    -4,4    ])/4  *25))*8), (${this, metric=@supermetric:"vSphere Cluster Memory Contention"} as MemLatc   < 0.5 ? (100 - ( (MemLatc   - 0)/0.5 * 25 ) ) * 1 : MemLatc   < 1 ? (75 - ((MemLatc   - 0.5)/0.5 * 25))*2 : MemLatc   < 2   ? (50-((MemLatc   - 1) /1 * 25))*4 : (25 - (min([MemLatc   -2,2    ])/1  *25))*8),(${this, metric=@supermetric:"vSphere Cluster Worst VM CPU Ready"}                                    as mReady    < 4    ? (100 - ( (mReady    - 0)/4    * 25 ) ) * 1 : mReady    < 8   ? (75 - ((mReady    - 4   )/4    * 25))*2 : mReady    < 16   ? (50-((mReady    - 8  ) /8   * 25))*4 : (25 - (min([mReady    -16,16    ])/16  *25))*8), (${this, metric=@supermetric:"vSphere Cluster Worst VM CPU Co-Stop"} as mCoStop   < 2    ? (100 - ( (mCoStop   - 0)/2    * 25 ) ) * 1 : mCoStop   < 4   ? (75 - ((mCoStop   - 2   )/2    * 25))*2 : mCoStop   < 8   ? (50-((mCoStop   - 4  ) /4   * 25))*4 : (25 - (min([mCoStop   -8,8    ])/8  *25))*8), (${this, metric=@supermetric:"vSphere Cluster Worst VM Memory Contention"}                            as mMemLatc  < 1    ? (100 - ( (mMemLatc  - 0)/1    * 25 ) ) * 1 : mMemLatc  < 2   ? (75 - ((mMemLatc  - 1   )/1    * 25))*2 : mMemLatc  < 4   ? (50-((mMemLatc  - 2  ) /2   * 25))*4 : (25 - (min([mMemLatc  -4,4    ])/4  *25))*8), (${this, metric=@supermetric:"vSphere Cluster Worst ESXi Bad Network Packets"} as BadNet    < 0.2  ? (100 - ( (BadNet    - 0)/0.2  * 25 ) ) * 1 : BadNet    < 0.4 ? (75 - ((BadNet    - 0.2 )/0.2  * 25))*2 : BadNet    < 0.8 ? (50-((BadNet    - 0.4) /0.4 * 25))*4 : (25 - (min([BadNet    -0.8,0.8])/0.8*25))*8), (${this, metric=@supermetric:"vSphere Cluster vMotions"} as vMotion   < 1    ? (100 - ( (vMotion   - 0)/1    * 25 ) ) * 1 : vMotion   < 2   ? (75 - ((vMotion   - 1   )/1    * 25))*2 : vMotion   < 4   ? (50-((vMotion   - 2  ) /2   * 25))*4 : (25 - (min([vMotion   -4,4    ])/4  *25))*8), (${this, metric=@supermetric:"vSphere Cluster Memory Zip Swap"} as MemStress < 0.25 ? (100 - ( (MemStress - 0)/0.25 * 25 ) ) * 1 : MemStress < 0.5 ? (75 - ((MemStress - 0.25)/0.25 * 25))*2 : MemStress < 1   ? (50-((MemStress - 0.5) /0.5 * 25))*4 : (25 - (min([MemStress -1,1    ])/1  *25))*8) ,(${this, metric=@supermetric:"vSphere Cluster Memory Ballooned"} as Balloon   < 1 ? (100 - ( (Balloon - 0)/1 * 25 ) ) * 1 : Balloon < 2 ? (75 - ((Balloon - 1)/1 * 25))*2 : Balloon < 4   ?
  (50-((Balloon - 2) /2 * 25))*4 : (25 - (min([Balloon -4,4    ])/4
  *25))*8)]) / sum([ (Ready     < 1  ? 1 : (Ready     < 2   ? 2 : (Ready     < 4  ? 4 : 8))) , (coStop    < 1 ? 1 : (coStop    < 2 ? 2 : (coStop    < 4  ? 4 : 8))) , (MemLatc   < 0.5 ? 1 : (MemLatc   < 1 ? 2 : (MemLatc   < 2  ? 4 : 8))) , (mReady    < 4    ? 1 : (mReady    < 8   ? 2 : (mReady    < 16  ? 4 : 8))) , (mCoStop   < 2    ? 1 : (mCoStop   < 4   ? 2 : (mCoStop   < 8  ? 4 : 8))) , (mMemLatc  < 1    ? 1 : (mMemLatc  < 2   ? 2 : (mMemLatc  < 4  ? 4 : 8))) ,
       (BadNet    < 0.2  ? 1 : (BadNet    < 0.4 ? 2 : (BadNet    < 0.8? 4 : 8))) ,
       (vMotion   < 1    ? 1 : (vMotion   < 2   ? 2 : (vMotion   < 4  ? 4 : 8))) ,
       (MemStress < 0.25 ? 1 : (MemStress < 0.5 ? 2 : (MemStress < 1  ? 4 : 8))),(Balloon < 1    ? 1 : (Balloon < 2   ? 2 : (Balloon < 4  ? 4 : 8))) ])
