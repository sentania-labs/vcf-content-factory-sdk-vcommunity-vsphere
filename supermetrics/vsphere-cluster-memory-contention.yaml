id: 82177821-b70b-4ece-a423-d89227070a26
name: "vSphere Cluster Memory Contention"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  The average CPU Memory Contention (latency) of all VMs in the cluster. This is using 20 second
  average instead of 5 minute average to give a leading indicator.

  For details, see VCF Operations Transformation book and vSphere Metrics book,
  which are parts of Operationalize Your World.
unit_id: percent
formula: |
  avg(${adaptertype=VMWARE, objecttype=VirtualMachine, attribute=mem|20_sec_peak_host_contentionPct, depth=3})
