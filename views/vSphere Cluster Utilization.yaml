id: e6404a9a-40b2-4687-9d41-f23b79bc7f93
name: vSphere Cluster Utilization
description: "List of clusters and their utilization. The context is capacity management,\
  \ not performance. 95th percentile is chosen. Note this is not a projection, so\
  \ it's not looking into the future. \n\nThe Performance metric is affected, as it\
  \ shows the 99th percentile. Capacity management should ignore outlier, different\
  \ from Performance management."
subject:
  adapter_kind: VMWARE
  resource_kind: ClusterComputeResource
columns:
- attribute: supermetric:"CPU Usable Capacity Utilization"
  display_name: Thread Utilization
  unit: percent
  transformation: PERCENTILE
  percentile: 95
  yellow_bound: 50.0
  orange_bound: 70.0
  red_bound: 90.0
  ascending_range: false
- attribute: cpu|vcpus_to_cores_allocation_ratio
  display_name: CPU Overcommit Ratio
  transformation: PERCENTILE
  percentile: 95
  yellow_bound: 1.25
  orange_bound: 2.5
  red_bound: 5.0
  ascending_range: false
- attribute: cpu|percentage_of_vms_facing_cpu_ready
  display_name: '% of VM with Ready'
  unit: percent
  transformation: PERCENTILE
  percentile: 95
  yellow_bound: 2.5
  orange_bound: 5.0
  red_bound: 10.0
  ascending_range: false
- attribute: cpu|percentage_of_vms_facing_cpu_costop
  display_name: '% of VM with Co-Stop'
  unit: percent
  transformation: PERCENTILE
  percentile: 95
  yellow_bound: 2.5
  orange_bound: 5.0
  red_bound: 10.0
  ascending_range: false
- attribute: mem|workload
  display_name: Memory Utilization
  unit: percent
  transformation: PERCENTILE
  percentile: 95
  yellow_bound: 90.0
  orange_bound: 94.0
  red_bound: 98.0
  ascending_range: false
- attribute: mem|vmmemctl_average
  display_name: Balloon
  unit: gb
  yellow_bound: 1.0
  orange_bound: 25.0
  red_bound: 100.0
  ascending_range: false
- attribute: mem|compressed_average
  display_name: Zipped
  unit: gb
  yellow_bound: 0.1
  orange_bound: 10.0
  red_bound: 20.0
  ascending_range: false
- attribute: mem|swapused_average
  display_name: Swapped
  unit: gb
  yellow_bound: 0.1
  orange_bound: 10.0
  red_bound: 20.0
  ascending_range: false
- attribute: mem|virtual_to_physical_memory_allocation_ratio
  display_name: Memory Overcommit Ratio
  transformation: PERCENTILE
  percentile: 95
  yellow_bound: 1.25
  orange_bound: 1.5
  red_bound: 2.0
  ascending_range: false
- attribute: mem|percentage_of_vms_facing_memory_contention
  display_name: '% of VM with Memory Contention'
  unit: percent
  transformation: PERCENTILE
  percentile: 95
  yellow_bound: 2.5
  orange_bound: 5.0
  red_bound: 10.0
  ascending_range: false
- attribute: summary|total_number_hosts
  display_name: ESXi Hosts
  yellow_bound: 9.0
  orange_bound: 6.0
  red_bound: 3.0
  ascending_range: true
time_window:
  unit: MONTHS
  count: 1
