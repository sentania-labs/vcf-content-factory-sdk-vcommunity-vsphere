id: 40c5bbc9-db9d-468c-8094-2137d22e53a7
name: VM Distribution by CPU Share
description: Relative distribution of VM CPU shares in a specific container (e.g.
  Cluster, Resource Pool, ESXi). A VM Share impacts the amount of CPU time given to
  it when there is not enough for all virtual machines in the cluster. This number
  needs to match the class of service, so ideally 1 number per cluster as a cluster
  should only deliver 1 class of service (e.g. Gold cluster).
subject:
  adapter_kind: VMWARE
  resource_kind: VirtualMachine
data_type: distribution
presentation: donut-chart
columns:
- attribute: supermetric:"Share per vCPU"
  display_name: .
time_window:
  unit: MINUTES
  count: 1
