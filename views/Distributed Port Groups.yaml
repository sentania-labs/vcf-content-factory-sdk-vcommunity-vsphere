id: 9e7dc458-f39f-4520-85bf-c87c525e061b
name: "Report: Distributed Port Groups for CSV export"
description: >-
  A simple table for export as a CSV file. Used in report only, hence it has
  no formatting. Just like the rest of the report, it is designed for weekly,
  not daily nor monthly.

  Schedule it to run end of the week, such as Sunday 23:59
