id: f6d0ed4e-9a22-4129-8d5c-150846b6a37b
name: VM Storage Configuration
description: "List of VMs and their storage related configuration. \n\nIf you want\
  \ to export to CSV, use the CSV report. All the CSV reports have many more columns\
  \ as they are purpose built for export."
subject:
  adapter_kind: VMWARE
  resource_kind: VirtualMachine
columns:
- attribute: config|hardware|diskSpace
  display_name: Disk Size
  unit: gb
  yellow_bound: 250.0
  orange_bound: 500.0
  red_bound: 1000.0
  ascending_range: false
- attribute: config|numVMDKs
  display_name: Number of Disks
  yellow_bound: 5.0
  orange_bound: 10.0
  red_bound: 15.0
  ascending_range: false
- attribute: config|numRDMs
  display_name: RDM Disk
  yellow_bound: 1.0
  orange_bound: 2.0
  red_bound: 4.0
  ascending_range: false
- attribute: diskspace|snapshot|snapshotAge
  display_name: Snapshot Age
  yellow_bound: 2.0
  orange_bound: 5.0
  red_bound: 10.0
  ascending_range: false
- attribute: summary|snapshot_space_used
  display_name: Snapshot Size
  unit: gb
  yellow_bound: 0.1
  orange_bound: 4.0
  red_bound: 16.0
  ascending_range: false
- attribute: summary|snapshot_count
  display_name: Number of Snapshots
  yellow_bound: 1.0
  orange_bound: 2.0
  red_bound: 4.0
  ascending_range: false
- attribute: summary|datastore
  display_name: Datastore
- attribute: summary|parentCluster
  display_name: Parent Cluster
- attribute: summary|parentDatacenter
  display_name: Parent Cluster
- attribute: summary|parentFolder
  display_name: Parent Folder
time_window:
  unit: DAYS
  count: 7
