name: vSphere Cluster DRS Automation Status
description: Relative distribution of clusters DRS automation level. You should set
  DRS to be fully automated, so adjustment can be done without the need for operator
  intervention. As DRS adjusts every 5 minutes, by the time human reacts the situation
  may have changed. Too aggressive or too conservative can also result in suboptimal
  performance or capacity.
