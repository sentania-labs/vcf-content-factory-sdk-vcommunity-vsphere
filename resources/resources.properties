# resources.properties — display strings for VCF Content Factory vCommunity vSphere.
# Keys are the integer nameKey values referenced in describe.xml.
# Only the standard <int>=label shape is used (matching the known-good
# compliance/synology/unifi control paks). The earlier <N>.description help-text
# keys were removed (build-2): the describe XSD has no schema-valid place to
# reference them (ResourceIdentifier/CredentialField allow only an <enum> child,
# not a <Description>), so they were unreferenced dotted keys suspected of
# causing whole-bundle rejection -> raw nameKeys in the Accounts UI. Field (i)
# tooltips are dropped pending a proper, schema-sanctioned re-add mechanism.

# Adapter Kind / solution display name
1=VCF Content Factory vCommunity vSphere

# vCenter Credential (vCenter user + password only)
