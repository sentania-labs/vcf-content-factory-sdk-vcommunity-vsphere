- id: c7426948-1d8e-4aea-b31c-e167bea65616
  type: Heatmap
  title: Analysis (3 heat maps)
  coords:
    x: 1
    y: 7
    w: 12
    h: 5
  self_provider: true
  mode: all
  depth: 10
  configs:
  - name: Time Remaining
    adapter_kind: VMWARE
    resource_kind: ClusterComputeResource
    color_by:
      metric_key: OnlineCapacityAnalytics|timeRemaining
      label: Capacity Analytics Generated|Time Remaining (Day(s))
    color:
      min_value: 0.0
      thresholds:
        values:
        - 0
        - 50
        - 100
        colors:
        - '#DE3F30'
        - '#ECC33E'
        - '#74B43B'
      max_value: 366.0
  - name: Capacity Remaining
    adapter_kind: VMWARE
    resource_kind: ClusterComputeResource
    color_by:
      metric_key: OnlineCapacityAnalytics|capacityRemainingPercentage
      label: Capacity Analytics Generated|Capacity Remaining Percentage (%)
    color:
      min_value: 0.0
      thresholds:
        values:
        - 0
        - 5
        - 10
        - 80
        colors:
        - '#DE3F30'
        - '#ED891F'
        - '#ECC33E'
        - '#74B43B'
        - '#8D8B8D'
      max_value: 100.0
    solid_coloring: true
  - name: VM Remaining
    adapter_kind: VMWARE
    resource_kind: ClusterComputeResource
    color_by:
      metric_key: OnlineCapacityAnalytics|capacityRemainingProfile
      label: Capacity Analytics Generated|Capacity Remaining (Profile)
    color:
      min_value: 0.0
      thresholds:
        values:
        - 0
        - 5
        - 10
        colors:
        - '#DE3F30'
        - '#ECC33E'
        - '#74B43B'
      max_value: 50.0
