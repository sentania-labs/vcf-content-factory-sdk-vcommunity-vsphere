name: vSphere Cluster Capacity (new)
description: Monitor the capacity of vSphere clusters. It lists all the clusters with
  their capacity remaining, time remaining and VM remaining. Select a cluster and
  its detail capacity over time will be automatically shown. If you have an unbalanced
  cluster, use the ESXi capacity dashboard to see the details.
