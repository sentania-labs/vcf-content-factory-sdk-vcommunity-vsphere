id: 4e036192-7592-4a78-a5ad-276f2bfa5980
name: VM Capacity (new)
description: Monitor the capacity of VMs. This dashboard lists all the hosts with
  their capacity remaining and time remaining. Select a VM and its detailed capacity
  over time will be automatically shown.
