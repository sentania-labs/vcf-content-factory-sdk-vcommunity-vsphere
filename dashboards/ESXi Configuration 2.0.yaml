id: b1b3ede5-32f2-4c49-a1a8-443dc23bd993
name: ESXi Configuration 2.0
description: Highlight ESXi Host configurations that need your attention. Use this
  dashboard to fix incorrect settings, update outdated components and reduce overall
  cost by optimizing your environment. The dashboard is organized top down, where
  configuration that needs your attention is shown first. No data on a chart means
  the configuration is optimized.
