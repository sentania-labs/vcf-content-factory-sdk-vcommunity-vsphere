name: vSphere Cluster Configuration 2.0
description: Highlight cluster configurations that need your attention. Use this dashboard
  to fix incorrect settings, update outdated components, and reduce overall cost by
  optimizing your environment. The dashboard is organized top down, where configuration
  that needs your attention is shown first. No data on a chart means the configuration
  is optimized.
