description: >
  vSphere/vCenter fork of the unified vCommunity Java SDK adapter (kind
  vcfcf_vcommunity_vsphere) — one of three paks the unified vcfcf_vcommunity
  adapter was split into per
  designs/managementpacks/vcommunity-three-adapter-split.md. Native Java SDK
  rewrite of vmbro/VCF-Operations-vCommunity (Onur Yuzseven, CC-licensed); kills
  the Docker-on-Cloud-Proxy runtime and runs natively in the collector. Reads
  vCenter via vim25 SOAP and pushes the vCommunity| property/metric namespace
  onto existing VMWARE ClusterComputeResource / HostSystem / VirtualMachine
  resources via ARIA_OPS-style Suite API stitching — cluster HA/DRS/EVC, host
  advanced settings / VIB packages / install date / licensing / NIC uplinks, VM
  config / extra-config / SCSI controllers / snapshot count, and the passive
  VMware-Tools Guest OS|Operating System|* path (vim25 guest.detailedData, no
  Windows credential). The in-guest Windows guest-ops surface (services, CSV
  OS-info, event logs via the GuestOperationsManager) and its Windows credential
  belong to the vcommunity-os pak and are NOT collected here. The build-2
  VMEntityVCID stitch-scoping fix is retained verbatim. See README for the
  migration runbook. Attribution: Onur Yuzseven / vmbro/VCF-Operations-vCommunity.
