name: "ESXi Host License Remaining Days Critical"
adapter_kind: VMWARE
resource_kind: HostSystem
wait_cycles: 1
cancel_cycles: 1
severity: CRITICAL
description: >
  Fires when a license assigned to this host has fewer than 30 days
  remaining before expiration. Ported from the source vCommunity pak's
  `ESXi Host License Expiring` symptom tier (<30 days), rationalized from
  the source's paired AND-bounded range to a single open (less-than)
  threshold — see the alert description for why.

  Instanced against `vCommunity|Licensing:<any license name>|Remaining
  Days` (colon-syntax group placeholder, `instanced: true` below) — no
  license SKU name is hardcoded, matching every license currently
  assigned to the host regardless of edition. A license with NO
  expiration date (vSphere/VCF 8.x perpetual licensing) never produces a
  Remaining Days metric at all (the collector emits no sentinel on a
  null expiration — see HostCollector.java), so a perpetually-licensed
  host structurally cannot fire this symptom. Only 9.x subscription-term
  licenses, which carry a real expiration date, are eligible to fire.
  No data is never treated as expiring.

condition:
  type: metric_static
  key: "vCommunity|Licensing:Any|Remaining Days"
  operator: LT
  value: 30
  instanced: true
