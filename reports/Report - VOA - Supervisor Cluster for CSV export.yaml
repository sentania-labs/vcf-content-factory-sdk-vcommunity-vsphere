id: 1f031062-ec6f-4dad-9669-b0836f4114a6
name: VOA - vSphere Supervisor for CSV export
description: >
  This CSV file is part of VCF Optimization Assessment. It's not a standalone file. Use it together with the other CSV export as each file only covers 1 object.

  It's designed for further analysis in a spreadsheet.

  To see for the whole environment, run this against vSphere World object. To see specific vCenter or vCenter Data Center, choose the object.

  Tailor this large view by removing unnecessary columns.
subject_types:
- adapter_kind: VMWARE
  resource_kind: ClusterComputeResource
  type: self
  filter: '[[{"condition":"EQUALS","metricKey":"configuration|wpConfiguration|wpEnabled","metricValue":{"isStringMetric":true,"value":"true"},"filterType":"properties"}]]'
- adapter_kind: VMWARE
  resource_kind: ClusterComputeResource
  type: descendant
  filter: '[[{"condition":"EQUALS","metricKey":"configuration|wpConfiguration|wpEnabled","metricValue":{"isStringMetric":true,"value":"true"},"filterType":"properties"}]]'
sections:
- type: View
  view: 'Report: Supervisor Cluster for CSV export'
  orientation: Portrait
  colorize: false
settings:
  show_page_footer: false
  output_formats:
  - csv
